<!DOCTYPE html>
<html>
<head>
<title>Mini Unity Editor</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  overflow: hidden;
}

#menu {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

#editor {
  display: none;
  height: 100vh;
}

#topbar {
  background: #2a2a40;
  padding: 5px;
}

#layout {
  display: flex;
  height: calc(100% - 40px);
}

#scene {
  flex: 1;
}

#objectsPanel {
  width: 200px;
  background: #2a2a40;
  padding: 10px;
  display: none;
}

#projectPanel {
  width: 200px;
  background: #1a1a2b;
  padding: 10px;
  overflow-y: auto;
}

#contextMenu {
  position: absolute;
  background: #2a2a40;
  border: 1px solid #444;
  display: none;
  z-index: 1000;
}

#contextMenu div {
  padding: 8px;
  cursor: pointer;
}

#contextMenu div:hover {
  background: #3a3a55;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Mini Engine</h1>
  <button onclick="start3D()">3D</button>
  <button onclick="start2D()">2D</button>
</div>

<div id="editor">
  <div id="topbar">
    <button onclick="toggleObjects()">Objects</button>
  </div>

  <div id="layout">

    <div id="projectPanel">
      <h3>Project</h3>
      <div id="assets"></div>
    </div>

    <div id="scene"></div>

    <div id="objectsPanel">
      <h3>Objects</h3>
      <button onclick="addCube()">Cube</button>
      <button onclick="addSphere()">Sphere</button>
      <button onclick="addStairs()">Stairs</button>
      <button onclick="addCircle()">Circle</button>
    </div>

  </div>
</div>

<div id="contextMenu">
  <div onclick="createItem('Script')">Create C# Script</div>
  <div onclick="createItem('Material')">Create Material</div>
  <div onclick="createItem('Folder')">Create Folder</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let assetCount = 0;

let keys = {};
let yaw = 0, pitch = 0;

/* START */
function start3D() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("editor").style.display = "block";
  init3D();
}

function start2D() {
  alert("2D not built yet");
}

/* INIT REAL 3D */
function init3D() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x202030);

  camera = new THREE.PerspectiveCamera(
    75,
    (window.innerWidth - 400) / (window.innerHeight - 40),
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth - 400, window.innerHeight - 40);
  renderer.shadowMap.enabled = true;

  document.getElementById("scene").appendChild(renderer.domElement);

  camera.position.set(0, 2, 5);

  let light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,5);
  light.castShadow = true;
  scene.add(light);

  scene.add(new THREE.AmbientLight(0x404040));

  let ground = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  let grid = new THREE.GridHelper(50, 50);
  scene.add(grid);

  animate();
}

/* OBJECTS */
function addCube() {
  let m = new THREE.Mesh(
    new THREE.BoxGeometry(),
    new THREE.MeshStandardMaterial({ color: 0x808080 })
  );
  m.position.y = 0.5;
  m.castShadow = true;
  scene.add(m);
}

function addSphere() {
  let m = new THREE.Mesh(
    new THREE.SphereGeometry(0.5,32,32),
    new THREE.MeshStandardMaterial({ color: 0x808080 })
  );
  m.position.y = 0.5;
  m.castShadow = true;
  scene.add(m);
}

function addStairs() {
  for(let i=0;i<5;i++){
    let s = new THREE.Mesh(
      new THREE.BoxGeometry(1,0.2,1),
      new THREE.MeshStandardMaterial({ color: 0x808080 })
    );
    s.position.y=i*0.2;
    s.position.z=i*-1;
    s.castShadow=true;
    scene.add(s);
  }
}

function addCircle() {
  let m = new THREE.Mesh(
    new THREE.CircleGeometry(1,32),
    new THREE.MeshStandardMaterial({ color: 0x808080 })
  );
  m.rotation.x = -Math.PI/2;
  scene.add(m);
}

/* PANELS */
function toggleObjects() {
  let p = document.getElementById("objectsPanel");
  p.style.display = p.style.display==="none"?"block":"none";
}

/* RIGHT CLICK MENU */
document.addEventListener("contextmenu", e=>{
  e.preventDefault();
  let m = document.getElementById("contextMenu");
  m.style.display="block";
  m.style.left=e.pageX+"px";
  m.style.top=e.pageY+"px";
});

/* LEFT CLICK CLOSE */
document.addEventListener("mousedown", e=>{
  if(e.button===0){
    document.getElementById("contextMenu").style.display="none";
  }
});

/* CREATE */
function createItem(type){
  assetCount++;
  let d=document.createElement("div");
  d.innerText=type+" "+assetCount+(type==="Script"?".cs":type==="Material"?".mat":"");
  document.getElementById("assets").appendChild(d);
}

/* CAMERA */
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

document.addEventListener("mousemove", e=>{
  if(!keys["shift"]) return;
  yaw -= e.movementX*0.002;
  pitch -= e.movementY*0.002;
  camera.rotation.order="YXZ";
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
});

function move(){
  let s=0.1;
  if(keys["w"]) camera.translateZ(-s);
  if(keys["s"]) camera.translateZ(s);
  if(keys["a"]) camera.translateX(-s);
  if(keys["d"]) camera.translateX(s);
}

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  move();
  renderer.render(scene,camera);
}
</script>

</body>
</html>
